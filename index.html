<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FAN-TAN MASTER - ROYAL TRADITION</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 🎰 ক্যাসিনো হেডার প্যানেল (ব্যালেন্স বক্স সহ ১ শতভাগ ডাইস-৩ডি স্ট্যান্ডার্ডে নিখুঁত লক ভাই ভাই) -->
    <div class="header">
        <div class="brand">
            <div class="name">FAN-TAN</div>
            <div class="game">BACCARAT TRADITIONAL KING</div>
        </div>
        <div class="header-right">
            <button class="sound-btn" id="mute-btn" onclick="toggleMute()">🔊</button>
            <div class="balance-box">৳ <span id="user-balance">0.00</span></div>
        </div>
    </div>

    <!-- 🎰 লাইভ ফ্যান-টান পুঁতি/বোতাম কাউন্টিং টেবিল বোর্ড এরিয়া ভাই ভাই -->
    <div class="fantan-table-zone">
        <div class="bowl-window-frame">
            <!-- ডাইনামিক লাইভ পুঁতি বা বোতাম ডিসপ্লে হোল্ডার গ্রিড ভাই ভাই -->
            <div class="beads-pool-display" id="beads-container-matrix">
                <!-- এখানে স্পিনের শুরুতে সব বোতাম একসাথে জমা হবে ভাই ভাই -->
                <div style="font-size: 32px; opacity: 0.15; font-weight: bold; text-align: center; width: 100%;">🏺<br><span style="font-size: 10px;">WAITTING BEADS</span></div>
            </div>
        </div>
        <!-- লাইভ রিমাইন্ডার অবশিষ্টাংশ কাউন্টার ব্যাজ -->
        <div class="total-beads-badge" id="beads-count-display">TOTAL BEADS: 0</div>
    </div>

    <!-- 🎯 বাজি ধরার প্রধান ৪টি নিয়ন বেটিং বোর্ড ঘর (x3.85 কিলার এশিয়ান ওডস কড়া লক ভাই ভাই) -->
    <div class="betting-board-fantan">
        <button class="fantan-board-btn" id="board-1" onclick="selectFantanSide(1)">
            <span class="fantan-num">1</span>
            <span class="fantan-odds">x3.85</span>
        </button>
        <button class="fantan-board-btn" id="board-2" onclick="selectFantanSide(2)">
            <span class="fantan-num">2</span>
            <span class="fantan-odds">x3.85</span>
        </button>
        <button class="fantan-board-btn" id="board-3" onclick="selectFantanSide(3)">
            <span class="fantan-num">3</span>
            <span class="fantan-odds">x3.85</span>
        </button>
        <button class="fantan-board-btn" id="board-4" onclick="selectFantanSide(4)">
            <span class="fantan-num">4</span>
            <span class="fantan-odds">x3.85</span>
        </button>
    </div>

    <!-- 🏆 ইন-লাইন লাইভ স্কোরিং ও উইন-লস মেসেজ বার -->
    <div class="win-status-container" id="win-status-box">
        <span id="win-text-msg">১, ২, ৩ নাকি ৪ অবশিষ্টাংশ থাকবে প্রেডিক্ট করে SORT বোতাম চাপুন ভাই!</span>
    </div>

    <!-- 🎛️ কন্ট্রোল প্যানেল এরিয়া (৳১-৳২০০০0 প্লাস-মাইনাস ও SORT বোতাম পাশাপাশি লক ভাই) -->
    <div class="footer-controls">
        <div class="play-section">
            <div class="bet-selector">
                <button class="bet-btn-nav" onclick="adjustBet('minus')">−</button>
                <div style="text-align: center; width: 60px;">
                    <div style="font-size: 9px; color: #aaa; font-weight: bold;">BET</div>
                    <div style="font-size: 15px; font-weight: 900; color: #fff;" id="bet-display">৳৫০</div>
                </div>
                <button class="bet-btn-nav" onclick="adjustBet('plus')">+</button>
            </div>

            <button class="play-btn" id="spin-btn" onclick="handleFantanSortAction()">SORT</button>

            <div class="icon-group">
                <button class="icon-btn" id="auto-btn" onclick="toggleAuto()">🔄</button>
            </div>
        </div>
    </div>

    <!-- 🔌 [উইনগো কালারトレード সিঙ্ক - ইউনিভার্সাল সকেট ইঞ্জিন লাইব্রেরি ভাই] -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const urlUserId = urlParams.get('userId') || urlParams.get('id') || urlParams.get('username') || "guest_user";
        const urlWallet = urlParams.get('wallet') || "main";
        
        const SERVER_URL = window.location.origin;

        let balance = 0.00;
        let currentBet = 50; 
        let selectedSide = null; 
        let isSpinning = false; 
        let isAuto = false;
        let isMuted = false;
        let autoInterval = null;

        // 🧠 [১ শতভাগ একুরেট ৪-৪ বোতাম সরানোর এশিয়ান অ্যানিমেশন ইঞ্জিন ভাই ভাই]
        function animateFantanBeadsSorting(serverData) {
            const container = document.getElementById("beads-container-matrix");
            const countBadge = document.getElementById("beads-count-display");
            
            let totalBeads = serverData.totalBeads;
            let finalResult = serverData.result;

            container.innerHTML = "";
            countBadge.innerText = `TOTAL BEADS: ${totalBeads}`;

            // ১. শুরুতে টেবিলে সব সাদা বোতাম ওয়ান-শটে ছড়িয়ে দেওয়া ভাই ভাই
            for (let i = 0; i < totalBeads; i++) {
                const bead = document.createElement("div");
                bead.className = "fantan-bead-node bead-pop-in";
                container.appendChild(bead);
            }

            let currentLeftBeads = totalBeads;
            
            // ২. ডিলার লাঠি দিয়ে ৪টি ৪টি করে বোতাম আলাদা করার ওরিজিনাল টাইমার চেইন ভাই ভাই
            setTimeout(() => {
                const sortingTimeline = setInterval(() => {
                    if (currentLeftBeads <= 4) {
                        clearInterval(sortingTimeline);
                        
                        // ফাইনাল অবশিষ্টাংশ রাউন্ড ফিনিশিং হাইলাইট ভাই ভাই
                        container.innerHTML = "";
                        for (let i = 0; i < finalResult; i++) {
                            const bead = document.createElement("div");
                            bead.className = "fantan-bead-node final-bead-glow-win";
                            container.appendChild(bead);
                        }
                        
                        countBadge.innerText = `REMAINDER: ${finalResult}`;
                        showFinalGameReward(serverData.status, serverData.winAmount, finalResult);
                        return;
                    }

                    // ৪টি বোতাম এক টানে প্লে ফিল্ড থেকে মাইনাস করা লক ভাই ভাই
                    currentLeftBeads -= 4;
                    playAudio('click');

                    // গ্রিড রি-রেন্ডার এনিমেশন মডিউল
                    container.innerHTML = "";
                    for (let i = 0; i < currentLeftBeads; i++) {
                        const bead = document.createElement("div");
                        bead.className = "fantan-bead-node";
                        container.appendChild(bead);
                    }
                    countBadge.innerText = `SORTING... LEFT: ${currentLeftBeads}`;

                }, 180); // 🚀 ১৮০ মিলি-সেকেন্ড ওরিজিনাল প্রফেশনাল ম্যাকাও বোতাম সরানোর গতি ভাই ভাই
            }, 600);
        }

        // 🛫 কোর SORT বোতাম ট্রিগার অ্যাকশন গেটওয়ে ভাই ভাই
        async function handleFantanSortAction() {
            if (isSpinning) return;
            if (!selectedSide) {
                alert("🚨 আগে বাজি ধরার যেকোনো ১টি অবশিষ্টাংশ নম্বর (১, ২, ৩ বা ৪) সিলেক্ট করুন ভাই!");
                isAuto = false;
                document.getElementById("auto-btn").classList.remove("active");
                return;
            }

            isSpinning = true;
            document.getElementById("spin-btn").disabled = true;
            document.getElementById("win-status-box").className = "win-status-container";
            document.getElementById("win-text-msg").innerText = "⚪ ডিলার কাপ থেকে রাজকীয় সাদা পুঁতি বের করছে...";

            playAudio('spin');

            try {
                const response = await fetch(`${SERVER_URL}/api/fantan-play`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: urlUserId,
                        amount: parseFloat(currentBet),
                        wallet: urlWallet,
                        prediction: selectedSide
                    })
                });

                const data = await response.json();

                if (data && data.success === true) {
                    balance = parseFloat(data.balance);
                    if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
                    if (window.top) window.top.postMessage({ action: "refresh_wallet" }, "*");

                    animateFantanBeadsSorting(data);
                } else {
                    alert(data.message || "❌ Insufficient Balance! Please Recharge BDT.");
                    stopFantanState();
                }
            } catch (err) {
                alert("⚠️ সেশন আউট! আবার SORT বোতাম চাপুন ভাই ভাই।");
                stopFantanState();
            }
        }

               function showFinalGameReward(status, winAmount, remainder) {
            const msgBox = document.getElementById("win-status-box");
            const textMsg = document.getElementById("win-text-msg");

            if (status === "win") {
                playAudio('win');
                msgBox.className = "win-status-container win-glow-bar";
                textMsg.innerText = `🏆 মেগা উইন!! অবশিষ্টাংশ বাকি রয়েছে হুবহু: [ ${remainder} ] টি বোতাম [৳${winAmount}]`;
            } else {
                playAudio('wheel'); 
                msgBox.className = "win-status-container lose-glow-bar";
                textMsg.innerText = `❌ অবশিষ্টাংশ বাকি রয়েছে: ${remainder} টি বোতাম। বাজি লস হয়েছে ভাই ভাই!`;
            }

            document.getElementById("user-balance").innerText = balance.toFixed(2);
            stopFantanState();

            if (isAuto) {
                autoInterval = setTimeout(() => {
                    if (isAuto) handleFantanSortAction();
                }, 2800); 
            }
        }

        if (typeof io !== 'undefined') {
            const socket = io();
            socket.on("balanceUpdate", (data) => {
                if (data && data.username === urlUserId) {
                    if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
                    fetchLiveBalance();
                }
            });
        }

        async function fetchLiveBalance() {
            try {
                const response = await fetch(`${SERVER_URL}/api/fantan-balance?userId=${urlUserId}&wallet=${urlWallet}`);
                const data = await response.json();
                if (data && data.success) {
                    balance = parseFloat(data.balance);
                    document.getElementById("user-balance").innerText = balance.toFixed(2);
                }
            } catch (e) { console.error("Balance fetch delay query pass"); }
        }

        window.onload = () => {
            if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
            fetchLiveBalance();
        };

        function selectFantanSide(num) {
            if (isSpinning) return;
            selectedSide = num;
            document.querySelectorAll(".fantan-board-btn").forEach(b => b.classList.remove("active-side-bet"));
            document.getElementById(`board-${num}`).classList.add("active-side-bet");
            playAudio('click');
        }

        function adjustBet(action) {
            if (isSpinning) return;
            if (action === 'minus' && currentBet > 1) {
                if (currentBet <= 10) currentBet -= 1;
                else if (currentBet <= 100) currentBet -= 10;
                else if (currentBet <= 1000) currentBet -= 100;
                else currentBet -= 500;
            }
            if (action === 'plus' && currentBet < 20000) {
                if (currentBet < 10) currentBet += 1;
                else if (currentBet < 100) currentBet += 10;
                else if (currentBet < 1000) currentBet += 100;
                else currentBet += 500;
            }
            if (currentBet < 1) currentBet = 1;
            if (currentBet > 20000) currentBet = 20000;
            
            document.getElementById("bet-display").innerText = `৳${currentBet}`;
            playAudio('click');
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById("mute-btn").innerText = isMuted ? "🔇" : "🔊";
            document.getElementById("mute-btn").classList.toggle("muted-active", isMuted);
            slotSounds.click.muted = isMuted;
            slotSounds.spin.muted = isMuted;
            slotSounds.win.muted = isMuted;
            slotSounds.wheel.muted = isMuted;
        }

        function toggleAuto() {
            isAuto = !isAuto;
            document.getElementById("auto-btn").classList.toggle("active", isAuto);
            if (isAuto && !isSpinning) handleFantanSortAction();
            playAudio('click');
        }

        function stopFantanState() {
            isSpinning = false;
            document.getElementById("spin-btn").disabled = false;
            if (!isAuto && autoInterval) clearTimeout(autoInterval);
        }

        // 🎯 [৪টি ওরিজিনাল প্রিমিয়াম ক্যাসিনো সাউন্ড ও বাফার গেটওয়ে লক ভাই ভাই]
        const slotSounds = {
            click: new Audio('click2.mp3'),
            spin: new Audio('spin2.mp3'),
            win: new Audio('win2.mp3'),
            wheel: new Audio('wheel1.mp3')
        };
        Object.values(slotSounds).forEach(s => s.load());

        function playAudio(type) { 
            if (isMuted) return; 
            try { 
                slotSounds[type].currentTime = 0; 
                slotSounds[type].play(); 
            } catch(e){} 
        }
    </script>
</body>
</html>
